name: Metrics

on:
  schedule:
    - cron: "0 20 * * *"   # Tiap hari, 20:00 UTC (~03:00 WIB)
  workflow_dispatch:       # Bisa dipicu manual dari tab Actions
  push:
    branches: 
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          # Bagian dasar
          template: classic
          base: header, activity, community, repositories, metadata

          # Bahasa yang paling sering dipakai
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 8

          # Kalender kontribusi bentuk isometrik
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Kebiasaan ngoding: jam & hari paling aktif
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Zona waktu
          config_timezone: Asia/Jakarta
